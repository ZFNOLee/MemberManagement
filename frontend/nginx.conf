server {
    listen 80;
    server_name _;

    # 前端静态文件
    location /fuintAdmin/ {
        alias /usr/share/nginx/html/fuintAdmin/;
        try_files $uri $uri/ /fuintAdmin/index.html;
        index index.html;
    }

    # 后端 API 反向代理
    # BACKEND_URL 需要替换为 Railway 后端服务的内部地址
    # 格式: http://fuint-backend.railway.internal:8080
    location /fuint-application/ {
        proxy_pass BACKEND_INTERNAL_URL/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        client_max_body_size 50m;
    }

    # 根路径重定向到前端
    location = / {
        return 301 /fuintAdmin/;
    }
}
