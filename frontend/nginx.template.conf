server {
    listen __PORT__;
    server_name _;

    # 前端静态文件
    location /fuintAdmin/ {
        alias /usr/share/nginx/html/fuintAdmin/;
        try_files $uri $uri/ /fuintAdmin/index.html;
        index index.html;
    }

    # 后端 API 反向代理 - backendApi
    location /backendApi/ {
        proxy_pass __BACKEND_URL__/backendApi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        client_max_body_size 50m;
    }

    # 后端 API 反向代理 - clientApi
    location /clientApi/ {
        proxy_pass __BACKEND_URL__/clientApi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        client_max_body_size 50m;
    }

    # 根路径重定向到前端
    location = / {
        return 301 /fuintAdmin/;
    }
}
