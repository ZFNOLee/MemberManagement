# ===================================================
# fuint 会员营销系统 - Railway 生产环境配置
# Railway 会自动注入 MySQL/Redis 服务的环境变量
# 本配置通过 ${VAR_NAME:defaultValue} 语法读取环境变量
# ===================================================

# ─── 数据库配置（自动读取 Railway MySQL 服务变量）─────────────────
# Railway MySQL 服务会自动注入: MYSQLHOST / MYSQLPORT / MYSQLUSER / MYSQLPASSWORD / MYSQLDATABASE
spring.datasource.url=jdbc:mysql://${MYSQLHOST:127.0.0.1}:${MYSQLPORT:3306}/${MYSQLDATABASE:fuint-db}?useUnicode=true&characterEncoding=UTF8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── Redis 配置（自动读取 Railway Redis 服务变量）─────────────────
# Railway Redis 服务会自动注入: REDISHOST / REDISPORT / REDISPASSWORD
spring.session.store-type=redis
spring.session.redis.namespace=fuint
spring.redis.database=0
spring.redis.host=${REDISHOST:127.0.0.1}
spring.redis.port=${REDISPORT:6379}
spring.redis.password=${REDISPASSWORD:}
spring.redis.timeout=5000
spring.redis.jedis.pool.max-active=10
spring.redis.jedis.pool.max-wait=-1
spring.redis.jedis.pool.max-idle=5
spring.redis.jedis.pool.min-idle=0

# ─── 服务器端口（Railway 会注入 PORT 变量）────────────────────────
server.port=${PORT:8080}

# ─── 文件上传目录 ────────────────────────────────────────────────
# Railway 容器是临时文件系统，建议使用对象存储；此处保留本地路径兼容性
uploadFile.path=/app/upload/

# ─── 定时任务开关 ────────────────────────────────────────────────
message.job.switch=0
message.job.time=0 0/1 * * * ?

couponExpire.job.switch=0
couponExpire.job.time=0 0/1 * * * ?

orderCancel.job.switch=0
orderCancel.job.time=0 0/1 * * * ?

commission.job.switch=1
commission.job.time=0 0/1 * * * ?

uploadShippingInfoJob.job.switch=1
uploadShippingInfoJob.job.time=0 0/1 * * * ?
